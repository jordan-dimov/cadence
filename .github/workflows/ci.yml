name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python 3.14
        run: uv python install 3.14
      - name: Sync
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run mypy
      - name: Test
        run: uv run pytest -q
